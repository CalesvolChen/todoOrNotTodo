name: todo_app
description: "Todo or Not Todo - 一个类 Microsoft To Do 的待办应用"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  image_picker: ^1.1.2
  record: ^5.1.2
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
